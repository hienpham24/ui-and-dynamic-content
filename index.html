<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <!-- MASTHEAD -->
  <div class="widget">
    <header class="masthead">
      <div class="masthead-icon">
        <img src="img/io-images-shopping-cart-1105047_640.png" />
      </div>
      <h1>BUY
        <span>GROCERIES</span>
      </h1>
      <p class="tagline">What do you need to buy today?</p>
    </header>

    <!-- MAIN CONTENT -->
    <section class="main-content">

      <div class="input-group">
        <input type="text" id="item-input" class="text-input" placeholder="your item here..." />
        <button id="add-btn" class="add-btn">ADD TO LIST</button>
      </div>

      <!-- feedback/ error message -->
      <p id="feedback" class="feedback" role="alert"></p>

      <!-- shopping list  -->
      <ul id="shopping-list" class="shopping-list"></ul>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
      <a href="#" class="social-link">
        <i class="fa-brands fa-x-twitter"></i>
      </a>

      <a href="#" class="social-link">
        <i class="fa-brands fa-linkedin-in"></i>
      </a>

      <a href="#" class="social-link">
        <i class="fa-brands fa-facebook-f"></i>
      </a>

    </footer>
  </div>
  <script src="js/index.js"></script>
</body>

</html>
